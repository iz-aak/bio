  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
    :root {
      --font-mono: 'Space Mono', monospace;
      --font-display: 'Montserrat', sans-serif;

<body>

  <!-- NAV PILL -->
  <nav id="nav-pill"></nav>

  <!-- HERO -->
  <section id="hero"></section>

  <!-- SOCIALS -->
  <section id="socials"></section>

  <!-- PROJECTS -->

  <!-- CATS -->

  <!-- CLOCK -->
  <section id="clock"></section>

  <footer>
    <span>© 2026 Izaak. All Rights Reserved.</span>
  </footer>

  <!-- PROJECT MODAL -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal"></div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <img src="" alt="Cat" />
    <div class="lightbox-name"></div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>

  <script>
    // Modal backdrop close
    document.getElementById('modal-backdrop').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    // Lightbox close
    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this || e.target.tagName !== 'IMG') closeLightbox();
    });
    // Escape key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); closeLightbox(); }
    });
  </script>
</body>
